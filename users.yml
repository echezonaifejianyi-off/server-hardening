---
- name: Create dedicated application user
  hosts: all
  become: true

  vars:
    app_user: appuser
    app_dir: /opt/app

  tasks:
    - name: Create dedicated non-root application user
      ansible.builtin.user:
        name: "{{ app_user }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false
        comment: "Dedicated application service account"

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0750"

    - name: Restrict /etc/passwd to root only
      ansible.builtin.file:
        path: /etc/passwd
        owner: root
        group: root
        mode: "0644"

    - name: Restrict /etc/shadow to root only
      ansible.builtin.file:
        path: /etc/shadow
        owner: root
        group: shadow
        mode: "0640"

    - name: List all users with sudo privileges
      ansible.builtin.command:
        cmd: grep -E "sudo|wheel" /etc/group
      register: sudo_users
      changed_when: false
      failed_when: false

    - name: Print sudo users
      ansible.builtin.debug:
        msg: "Users with sudo access: {{ sudo_users.stdout_lines }}"

    - name: Check for users with empty passwords
      ansible.builtin.command:
        cmd: awk -F':' '($2 == "" ) { print $1 }' /etc/shadow
      register: empty_passwords
      changed_when: false

    - name: Fail if any user has empty password
      ansible.builtin.fail:
        msg: "WARNING: These users have empty passwords: {{ empty_passwords.stdout_lines }}"
      when: empty_passwords.stdout_lines | length > 0
---
- name: Configure Docker credentials
  hosts: all
  become: true

  vars:
    docker_config_dir: /root/.docker

  tasks:
    - name: Check if Docker is installed
      ansible.builtin.command:
        cmd: docker --version
      register: docker_installed
      changed_when: false
      failed_when: false

    - name: Print Docker version
      ansible.builtin.debug:
        msg: "{{ docker_installed.stdout if docker_installed.rc == 0 else 'Docker is not installed on this server' }}"

    - name: Create Docker config directory
      ansible.builtin.file:
        path: "{{ docker_config_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0700"
      when: docker_installed.rc == 0

    - name: Configure Docker credentials file
      ansible.builtin.copy:
        dest: "{{ docker_config_dir }}/config.json"
        content: '{}'
        owner: root
        group: root
        mode: "0600"
      when: docker_installed.rc == 0

    - name: Verify Docker config exists
      ansible.builtin.command:
        cmd: cat {{ docker_config_dir }}/config.json
      register: docker_config
      changed_when: false
      when: docker_installed.rc == 0

    - name: Print Docker config
      ansible.builtin.debug:
        msg: "{{ docker_config.stdout }}"
      when: docker_installed.rc == 0
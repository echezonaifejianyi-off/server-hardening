---
- name: Audit server security
  hosts: all
  become: true

  tasks:
    - name: Check active sessions
      ansible.builtin.command:
        cmd: who
      register: active_sessions

    - name: Print active sessions
      ansible.builtin.debug:
        msg: "{{ active_sessions.stdout }}"

    - name: Check recent login history
      ansible.builtin.command:
        cmd: last -n 20
      register: login_history

    - name: Print login history
      ansible.builtin.debug:
        msg: "{{ login_history.stdout }}"

    - name: Check failed login attempts
      ansible.builtin.command:
        cmd: grep "Failed password" /var/log/auth.log
      register: failed_logins
      failed_when: false

    - name: Print failed login attempts
      ansible.builtin.debug:
        msg: "{{ failed_logins.stdout_lines[-20:] if failed_logins.stdout_lines | length > 0 else 'No failed login attempts found' }}"

    - name: Check top processes by CPU
      ansible.builtin.command:
        cmd: ps aux --sort=-%cpu
      register: running_processes

    - name: Print top 20 processes
      ansible.builtin.debug:
        msg: "{{ running_processes.stdout_lines[:20] }}"

    - name: Check active network connections
      ansible.builtin.command:
        cmd: ss -tnp
      register: network_connections

    - name: Print network connections
      ansible.builtin.debug:
        msg: "{{ network_connections.stdout }}"

    - name: Check recently modified system files
      ansible.builtin.shell:
        cmd: find /etc /usr/bin /usr/sbin -mtime -7 -type f 2>/dev/null
      register: modified_files
      failed_when: false

    - name: Print recently modified files
      ansible.builtin.debug:
        msg: "{{ modified_files.stdout_lines }}"

    - name: Check root crontab
      ansible.builtin.command:
        cmd: crontab -l
      register: root_crontab
      failed_when: false

    - name: Print root crontab
      ansible.builtin.debug:
        msg: "{{ root_crontab.stdout if root_crontab.stdout else 'No crontab for root' }}"

    - name: Check cron.d directory
      ansible.builtin.command:
        cmd: ls /etc/cron.d/
      register: cron_d

    - name: Print cron.d contents
      ansible.builtin.debug:
        msg: "{{ cron_d.stdout_lines }}"

    - name: Check for world-readable sensitive files
      ansible.builtin.shell:
        cmd: >
          find /
          {% for path in excluded_audit_paths %}
          -path {{ path }} -prune -o
          {% endfor %}
          \( {% for pattern in sensitive_file_patterns %} -name "{{ pattern }}" {% if not loop.last %}-o{% endif %} {% endfor %} \)
          -type f -print 2>/dev/null | xargs -r ls -la 2>/dev/null
      register: sensitive_files
      changed_when: false
      failed_when: false

    - name: Fail if sensitive files are found
      ansible.builtin.fail:
        msg: "WARNING: Sensitive files found — review immediately: {{ sensitive_files.stdout_lines }}"
      when: sensitive_files.stdout_lines | length > 0

    - name: Check all users with sudo privileges
      ansible.builtin.command:
        cmd: grep -E "sudo|wheel" /etc/group
      register: sudo_audit
      changed_when: false
      failed_when: false

    - name: Print sudo users
      ansible.builtin.debug:
        msg: "Users with sudo access: {{ sudo_audit.stdout_lines }}"
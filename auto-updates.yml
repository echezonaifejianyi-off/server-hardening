---
- name: Enable automatic security updates
  hosts: all
  become: true

  tasks:
    - name: Install unattended-upgrades
      ansible.builtin.apt:
        name:
          - unattended-upgrades
          - apt-listchanges
        state: present
        update_cache: yes

    - name: Configure unattended-upgrades
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        content: |
          Unattended-Upgrade::Allowed-Origins {
              "${distro_id}:${distro_codename}";
              "${distro_id}:${distro_codename}-security";
              "${distro_id}ESMApps:${distro_codename}-apps-security";
              "${distro_id}ESM:${distro_codename}-infra-security";
          };
          Unattended-Upgrade::DevRelease "false";
          Unattended-Upgrade::AutoFixInterruptedDpkg "true";
          Unattended-Upgrade::MinimalSteps "true";
          Unattended-Upgrade::Remove-Unused-Dependencies "true";
          Unattended-Upgrade::Automatic-Reboot "false";
          Unattended-Upgrade::Automatic-Reboot-Time "02:00";
        owner: root
        group: root
        mode: "0644"
      notify: Restart unattended-upgrades

    - name: Enable automatic updates
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Download-Upgradeable-Packages "1";
          APT::Periodic::AutocleanInterval "7";
          APT::Periodic::Unattended-Upgrade "1";
        owner: root
        group: root
        mode: "0644"

    - name: Ensure unattended-upgrades service is running
      ansible.builtin.service:
        name: unattended-upgrades
        state: started
        enabled: true

    - name: Verify unattended-upgrades configuration
      ansible.builtin.command:
        cmd: unattended-upgrades --dry-run
      register: upgrade_check
      changed_when: false
      failed_when: false

    - name: Print upgrade check result
      ansible.builtin.debug:
        msg: "{{ upgrade_check.stdout_lines }}"

    - name: Check if reboot is required after kernel update
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Notify if reboot is required
      ansible.builtin.debug:
        msg: "WARNING: This server requires a reboot to apply kernel updates. Schedule a maintenance window."
      when: reboot_required.stat.exists

  handlers:
    - name: Restart unattended-upgrades
      ansible.builtin.service:
        name: unattended-upgrades
        state: restarted 
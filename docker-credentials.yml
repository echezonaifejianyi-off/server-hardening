---
- name: Configure Docker credential helper
  hosts: all
  become: true

  vars:
    docker_config_dir: /root/.docker

  tasks:
    - name: Install gnupg2 and pass
      ansible.builtin.apt:
        name:
          - gnupg2
          - pass
        state: present
        update_cache: yes

    - name: Create Docker config directory
      ansible.builtin.file:
        path: "{{ docker_config_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Check if Docker is installed
      ansible.builtin.command:
        cmd: docker --version
      register: docker_version
      changed_when: false
      failed_when: false

    - name: Print Docker version
      ansible.builtin.debug:
        msg: "{{ docker_version.stdout if docker_version.rc == 0 else 'Docker is not installed on this server' }}"

    - name: Configure Docker to use pass credential helper
      ansible.builtin.copy:
        dest: "{{ docker_config_dir }}/config.json"
        content: |
          {
            "credsStore": "pass"
          }
        owner: root
        group: root
        mode: "0600"
      when: docker_version.rc == 0

    - name: Verify Docker config
      ansible.builtin.command:
        cmd: cat {{ docker_config_dir }}/config.json
      register: docker_config
      changed_when: false
      when: docker_version.rc == 0

    - name: Print Docker config
      ansible.builtin.debug:
        msg: "{{ docker_config.stdout }}"
      when: docker_version.rc == 0